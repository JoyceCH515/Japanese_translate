<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>日語即時翻譯</title>
<style>
  :root{
    --bg:#0d1021; --card:#171b33; --gold:#f5c34d; --ink:#f4f2ec;
    --ja:#8f96b8; --line:#262b4a; --err:#ff8080; --ok:#7ee0a3;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
  }
  header{
    padding:14px 18px 10px; display:flex; align-items:center;
    justify-content:space-between; border-bottom:1px solid var(--line); flex-shrink:0;
  }
  header h1{font-size:15px;font-weight:700;letter-spacing:.12em;color:var(--gold)}
  header .sub{font-size:11px;color:var(--ja);letter-spacing:.08em;margin-top:2px}
  #status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ja)}
  #dot{width:9px;height:9px;border-radius:50%;background:#4a5070;transition:background .2s}
  #dot.live{background:var(--gold);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,195,77,.55)}50%{box-shadow:0 0 0 7px rgba(245,195,77,0)}}
  @media (prefers-reduced-motion:reduce){#dot.live{animation:none}}

  #steps{
    flex-shrink:0; padding:10px 16px; border-bottom:1px solid var(--line);
    font-size:13px; line-height:1.9; display:none;
  }
  #steps .st{color:var(--ja)}
  #steps .st.ok{color:var(--ok)}
  #steps .st.bad{color:var(--err)}

  #feed{
    flex:1; overflow-y:auto; padding:16px 16px 8px;
    display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth;
  }
  #empty{margin:auto;text-align:center;color:var(--ja);font-size:14px;line-height:2;padding:0 30px}
  #empty b{color:var(--ink);font-weight:700}

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px 14px; animation:in .25s ease;
  }
  @keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card .ja{
    font-size:13px;color:var(--ja);line-height:1.55;
    padding-bottom:7px;margin-bottom:8px;border-bottom:1px dashed var(--line);
  }
  .card .zh{font-size:19px;font-weight:700;line-height:1.6;color:var(--ink)}
  .card .zh.wait{color:var(--ja);font-weight:400;font-size:15px}
  .card.interim{border-style:dashed;opacity:.75}
  .card.interim .zh{display:none}

  footer{
    flex-shrink:0; padding:12px 16px calc(16px + env(safe-area-inset-bottom));
    display:flex; gap:10px; align-items:center;
    border-top:1px solid var(--line); background:var(--bg);
  }
  #toggle{
    flex:1;height:58px;border:none;border-radius:29px;
    font-size:18px;font-weight:700;letter-spacing:.15em;font-family:inherit;cursor:pointer;
    background:var(--gold);color:#211a05;transition:background .15s,color .15s;
  }
  #toggle.on{background:#3a2f3f;color:var(--err);border:1px solid rgba(255,128,128,.4)}
  #clear{
    width:58px;height:58px;border-radius:50%;background:none;
    border:1px solid var(--line);color:var(--ja);font-size:12px;font-family:inherit;cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>日語即時翻譯</h1>
    <div class="sub">日本語 → 繁體中文</div>
  </div>
  <div id="status"><span id="dot"></span><span id="stTxt">待機中</span></div>
</header>

<div id="steps"></div>

<div id="feed">
  <div id="empty">
    按下 <b>開始聆聽</b>,允許麥克風權限,<br>
    把手機朝向聲音來源。<br>
    日文原文與中文翻譯會即時顯示在這裡。
  </div>
</div>

<footer>
  <button id="clear">清除</button>
  <button id="toggle">開始聆聽</button>
</footer>

<script>
(function(){
  var feed=document.getElementById('feed');
  var empty=document.getElementById('empty');
  var toggle=document.getElementById('toggle');
  var clearBtn=document.getElementById('clear');
  var dot=document.getElementById('dot');
  var stTxt=document.getElementById('stTxt');
  var steps=document.getElementById('steps');

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var rec=null, active=false, interimCard=null, wakeLock=null, micStream=null;
  var lastFinal='', lastFinalTime=0, firstStartShown=false;

  function logStep(msg,cls){
    steps.style.display='block';
    var d=document.createElement('div');
    d.className='st'+(cls?' '+cls:'');
    d.textContent=msg;
    steps.appendChild(d);
    while(steps.children.length>5) steps.removeChild(steps.firstChild);
  }
  function clearSteps(){steps.innerHTML='';steps.style.display='none';}

  function setUI(on){
    active=on;
    toggle.textContent=on?'停止':'開始聆聽';
    toggle.classList.toggle('on',on);
    dot.classList.toggle('live',on);
    stTxt.textContent=on?'聆聽中':'待機中';
  }

  function keepAwake(on){
    try{
      if(on && 'wakeLock' in navigator){
        navigator.wakeLock.request('screen').then(function(w){wakeLock=w;}).catch(function(){});
      }else if(wakeLock){ wakeLock.release(); wakeLock=null; }
    }catch(e){}
  }

  function scrollDown(){feed.scrollTop=feed.scrollHeight;}

  function addCard(jaText){
    empty.style.display='none';
    var c=document.createElement('div');
    c.className='card';
    c.innerHTML='<div class="ja"></div><div class="zh wait">翻譯中…</div>';
    c.querySelector('.ja').textContent=jaText;
    feed.appendChild(c); scrollDown();
    return c;
  }

  function showInterim(text){
    if(!text){ if(interimCard){interimCard.remove();interimCard=null;} return; }
    empty.style.display='none';
    if(!interimCard){
      interimCard=document.createElement('div');
      interimCard.className='card interim';
      interimCard.innerHTML='<div class="ja"></div><div class="zh"></div>';
      feed.appendChild(interimCard);
    }
    interimCard.querySelector('.ja').textContent=text;
    scrollDown();
  }

  function translate(jaText,card){
    var zh=card.querySelector('.zh');
    var url='https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=zh-TW&dt=t&q='+encodeURIComponent(jaText);
    fetch(url).then(function(r){
      if(!r.ok) throw new Error(r.status);
      return r.json();
    }).then(function(d){
      var out=(d[0]||[]).map(function(s){return s[0];}).join('');
      zh.textContent=out||'(無法翻譯)';
      zh.classList.remove('wait');
      scrollDown();
    }).catch(function(){
      zh.textContent='翻譯失敗,請確認網路連線';
      scrollDown();
    });
  }

  function makeRec(){
    var r=new SR();
    r.lang='ja-JP';
    r.continuous=true;
    r.interimResults=true;

    r.onstart=function(){
      if(!firstStartShown){
        firstStartShown=true;
        clearSteps();
        logStep('✓ 語音辨識已啟動,請說話','ok');
        setTimeout(function(){ clearSteps(); },3000);
      }
    };
    r.onaudiostart=function(){stTxt.textContent='聆聽中(收音正常)';};

    r.onresult=function(ev){
      var interim='';
      for(var i=ev.resultIndex;i<ev.results.length;i++){
        var res=ev.results[i];
        var txt=res[0].transcript.trim();
        if(!txt) continue;
        if(res.isFinal){
          showInterim('');
          var now=Date.now();
          // Android Chrome 重啟後會重複回報同一句,8 秒內相同內容跳過
          if(txt===lastFinal && now-lastFinalTime<8000) continue;
          lastFinal=txt; lastFinalTime=now;
          translate(txt, addCard(txt));
        }else{
          interim+=txt;
        }
      }
      if(interim) showInterim(interim);
    };

    r.onerror=function(ev){
      if(ev.error==='not-allowed'||ev.error==='service-not-allowed'){
        logStep('✕ 麥克風被拒絕('+ev.error+'):點網址列左邊圖示 → 權限 → 麥克風改為允許','bad');
        stop();
      }else if(ev.error==='network'){
        logStep('✕ 辨識服務連線失敗(network),確認網路後再按開始','bad');
      }else if(ev.error!=='no-speech'&&ev.error!=='aborted'){
        logStep('✕ 辨識錯誤:'+ev.error,'bad');
      }
    };

    r.onend=function(){
      if(active){ try{r.start();}catch(e){} }
    };
    return r;
  }

  function start(){
    clearSteps();
    firstStartShown=false;

    if(!SR){
      logStep('✕ 這個瀏覽器不支援語音辨識,請用 Android 的 Chrome','bad');
      return;
    }
    if(!window.isSecureContext){
      logStep('✕ 網址是 '+location.protocol+'// 開頭,無法使用麥克風','bad');
      logStep('必須用 https:// 網址開啟(例如 GitHub Pages),不能直接開檔案','bad');
      return;
    }
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      logStep('✕ 這個環境無法存取麥克風(可能是內嵌視窗),請用 Chrome 直接開網址','bad');
      return;
    }

    logStep('1. 正在要求麥克風權限…(此時應跳出詢問視窗)');

    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      micStream=stream;
      logStep('✓ 2. 麥克風權限取得成功','ok');
      // 權限到手後就把測試用的音訊流關掉,交給語音辨識自己收音
      stream.getTracks().forEach(function(t){t.stop();});
      micStream=null;

      if(!rec) rec=makeRec();
      try{rec.start();}catch(e){}
      setUI(true);
      keepAwake(true);
    }).catch(function(err){
      if(err.name==='NotAllowedError'||err.name==='SecurityError'){
        logStep('✕ 權限被拒絕('+err.name+')','bad');
        logStep('解法A:點網址列左邊圖示 → 權限 → 重設,重新整理後再按開始','bad');
        logStep('解法B:手機設定 → 應用程式 → Chrome → 權限 → 麥克風 → 允許','bad');
      }else if(err.name==='NotFoundError'){
        logStep('✕ 找不到麥克風裝置('+err.name+')','bad');
      }else{
        logStep('✕ 麥克風啟動失敗:'+err.name+' '+err.message,'bad');
      }
    });
  }

  function stop(){
    setUI(false);
    keepAwake(false);
    showInterim('');
    if(micStream){micStream.getTracks().forEach(function(t){t.stop();});micStream=null;}
    if(rec){try{rec.stop();}catch(e){}}
  }

  toggle.addEventListener('click',function(){ active?stop():start(); });

  clearBtn.addEventListener('click',function(){
    var cards=feed.querySelectorAll('.card');
    for(var i=0;i<cards.length;i++) cards[i].remove();
    interimCard=null;
    empty.style.display='';
    clearSteps();
  });

  document.addEventListener('visibilitychange',function(){
    if(!document.hidden && active){
      keepAwake(true);
      try{rec.start();}catch(e){}
    }
  });
})();
</script>
</body>
</html>
